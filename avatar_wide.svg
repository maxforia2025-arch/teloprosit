<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#0F0E14"/>
      <stop offset="1" stop-color="#1A1822"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.22" cy="0.5" r="0.62">
      <stop offset="0"    stop-color="#D98C7A" stop-opacity="0.20"/>
      <stop offset="0.55" stop-color="#D98C7A" stop-opacity="0.05"/>
      <stop offset="1"    stop-color="#D98C7A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#D98C7A" stop-opacity="0.35"/>
      <stop offset="0.30" stop-color="#D98C7A" stop-opacity="1"/>
      <stop offset="1"    stop-color="#D98C7A" stop-opacity="1"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#halo)"/>

  <path d="M 108.8 384.0 L 208.6 384.0 C 231.7 384.0 235.5 354.2 250.9 354.2 L 277.8 354.2 L 308.5 435.6 L 339.2 284.8 L 369.9 384.0 L 492.8 384.0" fill="none" stroke="url(#pulse)" stroke-width="17.9"
        stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <circle cx="492.8" cy="384.0" r="19.2" fill="#D98C7A" filter="url(#glow)"/>

  <text x="589" y="307"
        font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="93" font-weight="600" fill="#F1EDF5"
        letter-spacing="2.6">Тело просит</text>
  <text x="589" y="374"
        font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="37" font-weight="400" fill="#8B8496"
        letter-spacing="3.8">Тело говорит первым</text>
</svg>
