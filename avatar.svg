<svg xmlns="http://www.w3.org/2000/svg" width="640" height="640" viewBox="0 0 640 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#0F0E14"/>
      <stop offset="1" stop-color="#1A1822"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0"    stop-color="#D98C7A" stop-opacity="0.20"/>
      <stop offset="0.55" stop-color="#D98C7A" stop-opacity="0.05"/>
      <stop offset="1"    stop-color="#D98C7A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#D98C7A" stop-opacity="0.35"/>
      <stop offset="0.30" stop-color="#D98C7A" stop-opacity="1"/>
      <stop offset="1"    stop-color="#D98C7A" stop-opacity="1"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="640" height="640" fill="url(#bg)"/>
  <rect width="640" height="640" fill="url(#halo)"/>

  <!-- дыхательные кольца: тело в покое -->
  <circle cx="320.0" cy="320.0" r="240.0" fill="none" stroke="#D98C7A" stroke-opacity="0.14" stroke-width="2.6"/>
  <circle cx="320.0" cy="320.0" r="195.2" fill="none" stroke="#D98C7A" stroke-opacity="0.07" stroke-width="2.6"/>

  <!-- сигнал -->
  <path d="M 115.2 320.0 L 221.7 320.0 C 246.3 320.0 250.4 283.5 266.8 283.5 L 295.4 283.5 L 328.2 383.2 L 361.0 198.4 L 393.7 320.0 L 524.8 320.0" fill="none" stroke="url(#pulse)" stroke-width="19.2"
        stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <circle cx="524.8" cy="320.0" r="20.5" fill="#D98C7A" filter="url(#glow)"/>
</svg>
